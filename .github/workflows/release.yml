name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Import code signing certificate
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MAC_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm $RUNNER_TEMP/certificate.p12

      - name: Enable code signing in config
        run: |
          sed -i '' 's/codesign: false/codesign: true/' electrobun.config.ts
          sed -i '' 's/notarize: false/notarize: true/' electrobun.config.ts
          echo "Patched electrobun.config.ts for signing:"
          grep -E 'codesign|notarize' electrobun.config.ts

      - name: Clean previous build artifacts
        run: rm -rf ./build ./artifacts

      - name: Build stable release (signed + notarized)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          COPYFILE_DISABLE: "1"
          COPY_EXTENDED_ATTRIBUTES_DISABLE: "1"
        run: |
          bunx vite build
          # Electrobun bug: after codesign+notarize+staple, it tars the .app, deletes
          # the original, compresses to .tar.zst, then tries to re-sign the deleted .app.
          # The signed .app.tar.zst is already created before the crash, so we let it fail
          # and recover the artifacts manually.
          bunx electrobun build --env=stable || echo "::warning::electrobun build exited with $? (known post-tar codesign bug, recovering artifacts)"

      - name: Create release artifacts
        run: |
          BUILD_DIR="./build/stable-macos-arm64"
          APP_NAME="dev-3.0"
          PLATFORM_PREFIX="stable-macos-arm64"
          TAR_ZST="${BUILD_DIR}/${APP_NAME}.app.tar.zst"
          TAR="${BUILD_DIR}/${APP_NAME}.app.tar"

          # Verify the tar.zst was created before the crash
          if [ ! -f "$TAR_ZST" ] && [ ! -f "$TAR" ]; then
            echo "::error::Neither tar.zst nor tar found — build failed before tarring"
            exit 1
          fi

          mkdir -p ./artifacts

          # Compress tar if electrobun didn't get to it
          if [ ! -f "$TAR_ZST" ] && [ -f "$TAR" ]; then
            ZSTD="./node_modules/electrobun/dist-macos-arm64/zig-zstd"
            "$ZSTD" "$TAR" -o "$TAR_ZST"
          fi
          cp "$TAR_ZST" "./artifacts/${PLATFORM_PREFIX}-${APP_NAME}.app.tar.zst"

          # Extract .app from tar to recover version.json and create DMG
          RECOVER_DIR="${BUILD_DIR}/recovered"
          mkdir -p "$RECOVER_DIR"
          tar -xf "$TAR" -C "$RECOVER_DIR" 2>/dev/null || tar -xf <(zstd -d "$TAR_ZST" --stdout) -C "$RECOVER_DIR"

          # Read version info
          VERSION_JSON="${RECOVER_DIR}/${APP_NAME}.app/Contents/Resources/version.json"
          HASH=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.hash)")
          VERSION=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.version)")
          echo "Bundle hash: $HASH, version: $VERSION"

          # Create update.json
          echo "{\"version\":\"${VERSION}\",\"hash\":\"${HASH}\",\"os\":\"macos\",\"arch\":\"arm64\"}" \
            > "./artifacts/${PLATFORM_PREFIX}-update.json"

          # Create DMG from recovered .app
          DMG_PATH="./artifacts/${PLATFORM_PREFIX}-${APP_NAME}.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder "${RECOVER_DIR}/${APP_NAME}.app" \
            -ov -format UDZO "$DMG_PATH"

          echo "Artifacts created:"
          ls -lh ./artifacts/

      - name: Upload tagged artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: aws s3 sync ./artifacts/ s3://h0x91b-releases/dev-3.0/${{ github.ref_name }}/

      - name: Upload latest artifacts for auto-updater
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: aws s3 sync ./artifacts/ s3://h0x91b-releases/dev-3.0/ --exclude "*.dmg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/${{ github.ref_name }}"
          DMG=$(ls ./artifacts/stable-macos-*-*.dmg 2>/dev/null | head -1 | xargs basename)

          {
            echo "## Download"
            echo ""
            echo "- [\`$DMG\`]($S3_BASE/$DMG)"
            echo ""
            echo "### All artifacts"
            echo ""
            for file in ./artifacts/*; do
              name=$(basename "$file")
              echo "- [\`$name\`]($S3_BASE/$name)"
            done
          } > /tmp/release-notes.md

          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md
