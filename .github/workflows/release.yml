name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Import code signing certificate
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$MAC_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm $RUNNER_TEMP/certificate.p12

      - name: Enable code signing in config
        run: |
          sed -i '' 's/codesign: false/codesign: true/' electrobun.config.ts
          sed -i '' 's/notarize: false/notarize: true/' electrobun.config.ts
          echo "Patched electrobun.config.ts for signing:"
          grep -E 'codesign|notarize' electrobun.config.ts

      - name: Clean previous build artifacts
        run: rm -rf ./build ./artifacts

      - name: Build stable release (signed + notarized)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          COPYFILE_DISABLE: "1"
          COPY_EXTENDED_ATTRIBUTES_DISABLE: "1"
        run: |
          bunx vite build
          # Electrobun bug: after codesign+notarize+staple, it tars the .app, deletes
          # the original, compresses to .tar.zst, then tries to re-sign the deleted .app.
          # The signed .app.tar.zst is already created before the crash, so we let it fail
          # and recover the artifacts manually.
          bunx electrobun build --env=stable || echo "::warning::electrobun build exited with $? (known post-tar codesign bug, recovering artifacts)"

      - name: Debug build output
        if: always()
        run: |
          echo "=== ./build/ ==="
          find ./build -maxdepth 3 -type f 2>/dev/null || echo "(empty)"
          echo ""
          echo "=== ./artifacts/ ==="
          ls -lhR ./artifacts/ 2>/dev/null || echo "(empty)"

      - name: Create release artifacts
        run: |
          BUILD_DIR="./build/stable-macos-arm64"
          APP_NAME="dev-3.0"
          PLATFORM_PREFIX="stable-macos-arm64"

          # Helper: create DMG with /Applications symlink
          # Usage: create_dmg <app_path> <dmg_output_path> <vol_name>
          create_dmg() {
            local APP_PATH="$1"
            local DMG_OUT="$2"
            local VOL_NAME="$3"

            # Unmount any leftover volume from previous runs
            hdiutil detach "/Volumes/${VOL_NAME}" -force 2>/dev/null || true
            hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true

            # Stage .app + Applications symlink
            local STAGE_DIR
            STAGE_DIR=$(mktemp -d)
            cp -R "$APP_PATH" "$STAGE_DIR/"
            ln -s /Applications "$STAGE_DIR/Applications"

            hdiutil create -volname "$VOL_NAME" -srcfolder "$STAGE_DIR" \
              -ov -format UDZO "$DMG_OUT"

            # Cleanup
            rm -rf "$STAGE_DIR"
            hdiutil detach "/Volumes/${VOL_NAME}" -force 2>/dev/null || true
          }

          # Electrobun may succeed fully and move artifacts to ./artifacts/,
          # or it may crash after tarring and leave tar/tar.zst in the build dir.
          # We handle both cases.

          # Case 1: Electrobun succeeded and created its own artifacts
          EBUN_TAR_ZST=$(find ./artifacts -name "*.app.tar.zst" 2>/dev/null | head -1)
          EBUN_DMG=$(find ./artifacts -name "*.dmg" 2>/dev/null | head -1)
          EBUN_UPDATE=$(find ./artifacts -name "update.json" -o -name "*-update.json" 2>/dev/null | head -1)

          if [ -n "$EBUN_TAR_ZST" ]; then
            echo "Electrobun created artifacts successfully, using them directly"
            ls -lh ./artifacts/

            # Rename to our naming convention if needed
            mkdir -p ./artifacts-final
            cp "$EBUN_TAR_ZST" "./artifacts-final/${PLATFORM_PREFIX}-${APP_NAME}.app.tar.zst"

            # Get version info from Electrobun's update.json or from the .app
            if [ -n "$EBUN_UPDATE" ]; then
              HASH=$(bun -e "const j=await Bun.file('${EBUN_UPDATE}').json();console.log(j.hash)")
              VERSION=$(bun -e "const j=await Bun.file('${EBUN_UPDATE}').json();console.log(j.version)")
            else
              # Extract from tar.zst
              RECOVER_DIR="${BUILD_DIR}/recovered"
              mkdir -p "$RECOVER_DIR"
              tar -xf <(zstd -d "$EBUN_TAR_ZST" --stdout) -C "$RECOVER_DIR"
              VERSION_JSON="${RECOVER_DIR}/${APP_NAME}.app/Contents/Resources/version.json"
              HASH=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.hash)")
              VERSION=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.version)")
            fi
            echo "Bundle hash: $HASH, version: $VERSION"

            # Create our update.json with platform prefix
            echo "{\"version\":\"${VERSION}\",\"hash\":\"${HASH}\",\"os\":\"macos\",\"arch\":\"arm64\"}" \
              > "./artifacts-final/${PLATFORM_PREFIX}-update.json"

            # Use Electrobun's DMG or create one with /Applications symlink
            if [ -n "$EBUN_DMG" ]; then
              cp "$EBUN_DMG" "./artifacts-final/${PLATFORM_PREFIX}-${APP_NAME}.dmg"
            elif [ -d "${BUILD_DIR}/${APP_NAME}.app" ]; then
              create_dmg "${BUILD_DIR}/${APP_NAME}.app" "./artifacts-final/${PLATFORM_PREFIX}-${APP_NAME}.dmg" "${APP_NAME} ${VERSION}"
            fi

            rm -rf ./artifacts
            mv ./artifacts-final ./artifacts
            echo "Final artifacts:"
            ls -lh ./artifacts/
            exit 0
          fi

          # Case 2: Electrobun crashed — recover from tar in build dir
          echo "Electrobun artifacts not found, recovering from build dir..."
          TAR_ZST="${BUILD_DIR}/${APP_NAME}.app.tar.zst"
          TAR="${BUILD_DIR}/${APP_NAME}.app.tar"

          if [ ! -f "$TAR_ZST" ] && [ ! -f "$TAR" ]; then
            echo "::error::Neither tar.zst nor tar found — build failed before tarring"
            find ./build -maxdepth 3 -type f 2>/dev/null || true
            exit 1
          fi

          mkdir -p ./artifacts

          # Compress tar if electrobun didn't get to it
          if [ ! -f "$TAR_ZST" ] && [ -f "$TAR" ]; then
            ZSTD="./node_modules/electrobun/dist-macos-arm64/zig-zstd"
            "$ZSTD" "$TAR" -o "$TAR_ZST"
          fi
          cp "$TAR_ZST" "./artifacts/${PLATFORM_PREFIX}-${APP_NAME}.app.tar.zst"

          # Extract .app from tar to recover version.json and create DMG
          RECOVER_DIR="${BUILD_DIR}/recovered"
          mkdir -p "$RECOVER_DIR"
          tar -xf "$TAR" -C "$RECOVER_DIR" 2>/dev/null || tar -xf <(zstd -d "$TAR_ZST" --stdout) -C "$RECOVER_DIR"

          # Read version info
          VERSION_JSON="${RECOVER_DIR}/${APP_NAME}.app/Contents/Resources/version.json"
          HASH=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.hash)")
          VERSION=$(bun -e "const j=await Bun.file('${VERSION_JSON}').json();console.log(j.version)")
          echo "Bundle hash: $HASH, version: $VERSION"

          # Create update.json
          echo "{\"version\":\"${VERSION}\",\"hash\":\"${HASH}\",\"os\":\"macos\",\"arch\":\"arm64\"}" \
            > "./artifacts/${PLATFORM_PREFIX}-update.json"

          # Create DMG from recovered .app (with /Applications symlink)
          DMG_PATH="./artifacts/${PLATFORM_PREFIX}-${APP_NAME}.dmg"
          create_dmg "${RECOVER_DIR}/${APP_NAME}.app" "$DMG_PATH" "${APP_NAME} ${VERSION}"

          echo "Artifacts created:"
          ls -lh ./artifacts/

      - name: Upload tagged artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: aws s3 sync ./artifacts/ s3://h0x91b-releases/dev-3.0/${{ github.ref_name }}/

      - name: Upload latest artifacts for auto-updater
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: aws s3 sync ./artifacts/ s3://h0x91b-releases/dev-3.0/ --exclude "*.dmg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/${{ github.ref_name }}"
          DMG=$(ls ./artifacts/stable-macos-*-*.dmg 2>/dev/null | head -1 | xargs basename)

          {
            echo "## Download"
            echo ""
            echo "- [\`$DMG\`]($S3_BASE/$DMG)"
            echo ""
            echo "### All artifacts"
            echo ""
            for file in ./artifacts/*; do
              name=$(basename "$file")
              echo "- [\`$name\`]($S3_BASE/$name)"
            done
          } > /tmp/release-notes.md

          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md
