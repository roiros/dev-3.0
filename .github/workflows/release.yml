name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Restore node_modules cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ./node_modules
          key: bun-deps-arm64-${{ hashFiles('bun.lockb') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install

      - name: Save node_modules cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./node_modules
          key: bun-deps-arm64-${{ hashFiles('bun.lockb') }}

      - name: Run tests
        run: bun run test

      - name: Import code signing certificate
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $RUNNER_TEMP/certificate.p12

      - name: Enable code signing in config
        run: |
          sed -i '' 's/codesign: false/codesign: true/' electrobun.config.ts
          sed -i '' 's/notarize: false/notarize: true/' electrobun.config.ts
          echo "Patched electrobun.config.ts for signing:"
          grep -E 'codesign|notarize' electrobun.config.ts

      - name: Clean build directory
        run: rm -rf ./build ./artifacts

      - name: Build release (signed + notarized)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          COPYFILE_DISABLE: "1"
          COPY_EXTENDED_ATTRIBUTES_DISABLE: "1"
        run: |
          bun scripts/generate-build-info.ts
          bun scripts/generate-changelog.ts
          bunx vite build
          bunx electrobun build --env=stable || echo "::warning::electrobun build exited with $? (known post-tar codesign bug, recovering artifacts)"

      - name: Debug build output
        if: always()
        run: |
          echo "=== ./build/ ==="
          find ./build -maxdepth 3 -type f 2>/dev/null || echo "(empty)"
          echo "=== ./artifacts/ ==="
          ls -lhR ./artifacts/ 2>/dev/null || echo "(empty)"

      - name: Create release artifacts
        run: bash ./scripts/create-release-artifacts.sh arm64

      - name: Upload artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          aws s3 sync ./artifacts-arm64/ s3://h0x91b-releases/dev-3.0/${{ github.ref_name }}/
          aws s3 sync ./artifacts-arm64/ s3://h0x91b-releases/dev-3.0/ --exclude "*.dmg"
          echo "Artifacts uploaded to S3"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/${{ github.ref_name }}"

          {
            echo "## Download"
            echo ""
            echo "### macOS (Apple Silicon)"
            echo "- [\`stable-macos-arm64-dev-3.0.dmg\`]($S3_BASE/stable-macos-arm64-dev-3.0.dmg)"
            echo ""
            echo "### All artifacts"
            echo ""
            for file in ./artifacts-arm64/*; do
              name=$(basename "$file")
              echo "- [\`$name\`]($S3_BASE/$name)"
            done
          } > /tmp/release-notes.md

          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./artifacts-arm64/stable-macos-arm64-dev-3.0.dmg \
            --clobber

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DMG_PATH="./artifacts-arm64/stable-macos-arm64-dev-3.0.dmg"
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')

          echo "Updating Homebrew Cask: version=${VERSION} sha256=${SHA256}"

          rm -rf /tmp/homebrew-dev3
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/h0x91b/homebrew-dev3.git" /tmp/homebrew-dev3
          cd /tmp/homebrew-dev3

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/dev3.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/dev3.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dev3.rb
          git commit -m "Update dev3 to ${VERSION}"
          git push origin main
