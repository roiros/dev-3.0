name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build stable release
        run: bunx vite build && bunx electrobun build --env=stable

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: aws s3 sync ./artifacts/ s3://h0x91b-releases/dev-3.0/${{ github.ref_name }}/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          S3_BASE="https://h0x91b-releases.s3.eu-west-1.amazonaws.com/dev-3.0/${{ github.ref_name }}"
          DMG=$(ls ./artifacts/stable-macos-*-*.dmg 2>/dev/null | head -1 | xargs basename)

          {
            echo "## Download"
            echo ""
            echo "- [\`$DMG\`]($S3_BASE/$DMG)"
            echo ""
            echo "### All artifacts"
            echo ""
            for file in ./artifacts/*; do
              name=$(basename "$file")
              echo "- [\`$name\`]($S3_BASE/$name)"
            done
          } > /tmp/release-notes.md

          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md
